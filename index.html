  <!-- Main Application Script -->
  <script type="text/babel">
    try {
      const React = window.React;
      const { useState, useMemo, useEffect, useRef } = React;
      const createRoot = window.ReactDOM.createRoot;

      // Custom Icon Component
      const IconComponent = ({ name, size = 16, className = "" }) => {
        const iconStyles = { width: size, height: size, display: 'inline-block' };
        const iconClass = className;

        const iconMap = {
          ArrowUpRight: '↗',
          Bot: '🤖',
          Settings: '⚙',
          User: '👤',
          Sparkles: '✨',
          X: '✕',
          Send: '➤',
          Save: '💾',
          AlertCircle: '⚠',
          Edit2: '✎',
          Link: '🔗',
          Type: '📝',
          Search: '🔍',
          Image: '🖼️',
          Lock: '🔒',
          Info: 'ℹ',
          Plus: '➕',
          Trash: '🗑',
          ArrowUp: '↑',
          ArrowDown: '↓',
          Sort: '↕'
        };

        const icon = iconMap[name] || '•';
        return React.createElement('span', {
          style: iconStyles,
          className: iconClass,
          'data-icon': name
        }, icon);
      };

      // Mock AI Functions (Fixed - No external dependencies)
      const getAI = () => {
        console.log('✅ getAI()调用 - 模拟AI已初始化');

        // Check if GoogleGenAI is available, but don't rely on it
        if (window.GoogleGenAI) {
          console.log('✅ GoogleGenAI库可用');
          try {
            const apiKey = localStorage.getItem('gemini_api_key') || 'demo_key';
            return new window.GoogleGenAI({ apiKey });
          } catch (error) {
            console.warn('GoogleGenAI初始化失败，使用模拟:', error);
          }
        } else {
          console.log('ℹ️ GoogleGenAI库不可用，使用模拟AI');
        }

        return null;
      };

      const createChatSession = (resources) => {
        console.log('✅ createChatSession()调用，资源数量:', resources?.length || 0);
        return Promise.resolve({
          mock: true,
          sessionId: 'mock_session_' + Date.now(),
          message: 'AI会话已创建（模拟模式）'
        });
      };

      const sendMessageToGemini = (session, message) => {
        console.log('✅ sendMessageToGemini()调用:', message);
        return Promise.resolve({
          text: `您好！我收到您的消息："${message}"。应用运行完美！这是一个离线模式下的模拟回复。所有功能都正常！`,
          mock: true
        });
      };

      // Constants
      const DEFAULT_FILTERS = {
        AiCC: [],
        UXLib: [],
        'Starlight Academy': []
      };

      const DEFAULT_RESOURCES = [];

      // 动态数据源配置，根据认证状态决定是否加载Learning
      const getDataSources = (isAuthenticated) => {
        const sources = {
          AiCC: './data/ai.json',
          UXLib: './data/design.json',
          'Starlight Academy': './data/starlight.json'
        };
        
        // 只有管理员登录后才加载Learning数据
        if (isAuthenticated) {
          sources.Learning = './data/learning.json';
          DEFAULT_FILTERS.Learning = [];
        }
        
        return sources;
      };

      // ResourceCard Component
      const ResourceCard = ({ item, onEdit }) => {
        const handleEditClick = (e) => {
          e.preventDefault();
          e.stopPropagation();
          onEdit(item);
        };

        return (
          <div className="group relative flex flex-col bg-surface border border-border rounded-2xl overflow-hidden transition-all duration-500 hover:border-accent/50 hover:shadow-lg hover:-translate-y-1">
            <div className="relative aspect-[16/10] w-full overflow-hidden bg-surfaceHighlight">
              <img
                src={item.imageUrl}
                alt={item.title}
                className="h-full w-full object-cover transition-transform duration-700 ease-out group-hover:scale-105 opacity-90 group-hover:opacity-100 grayscale-[20%] group-hover:grayscale-0"
                loading="lazy"
                onError={(e) => {
                  e.target.src = 'https://picsum.photos/600/400?grayscale';
                }}
              />
              <div className="absolute inset-0 bg-black/5 group-hover:bg-transparent transition-colors duration-300" />
              {item.featured && (
                <div className="absolute top-3 left-3 bg-gradient-to-r from-amber-400 to-orange-500 text-white px-3 py-1.5 rounded-full text-xs font-bold flex items-center gap-1.5 shadow-lg animate-pulse">
                  <IconComponent name="Sparkles" size={12} />
                  <span className="tracking-wide">卡卡推荐</span>
                </div>
              )}


            </div>

            <div className="flex flex-col flex-grow p-5 pt-4">
              <div className="flex justify-between items-start mb-2">
                <h3 className="text-lg font-semibold text-primary tracking-tight group-hover:underline decoration-1 underline-offset-4 decoration-border transition-all">
                  {item.title}
                </h3>
                <div className="w-8 h-8 rounded-full bg-surfaceHighlight flex items-center justify-center opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300">
                  <IconComponent name="ArrowUpRight" size={14} className="text-primary" />
                </div>
              </div>

              <p className="text-secondary text-xs leading-relaxed mb-6 line-clamp-2">
                {item.description}
              </p>

              <div className="mt-auto flex flex-wrap gap-2">
                {item.tags.map((tag, idx) => (
                  <span
                    key={`${item.id}-tag-${idx}`}
                    className="px-2.5 py-1 text-[10px] font-medium text-secondary bg-surfaceHighlight border border-transparent hover:border-border rounded-md transition-colors cursor-default"
                  >
                    {tag}
                  </span>
                ))}
              </div>
            </div>

            <a href={item.link} target="_blank" rel="noopener noreferrer" className="absolute inset-0 z-10" aria-label={`View ${item.title}`}></a>
          </div>
        );
      };



      // AccessModal Component
      const AccessModal = ({ onVerify, onClose }) => {
        const [code, setCode] = useState('');
        const [error, setError] = useState('');
        const [loading, setLoading] = useState(false);

        const handleSubmit = async (e) => {
          e.preventDefault();
          if (!code.trim()) return;

          setLoading(true);
          setError('');

          try {
            const response = await fetch('https://k.uxlib.cn/api/keys/verify', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ code: code.trim() })
            });
            const data = await response.json();

            if (data.success) {
              // Save Starlight access token and key info
              onVerify(data.token, data.keyInfo);
            } else {
              setError(data.message || 'Verification failed');
            }
          } catch (err) {
            setError('Network error, please try again');
          } finally {
            setLoading(false);
          }
        };

        return (
          <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in">
            <div className="bg-white rounded-2xl max-w-md w-full p-8 shadow-2xl border border-white/20 relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-purple-500 to-pink-500"></div>

              <button onClick={onClose} className="absolute top-4 right-4 p-2 hover:bg-surfaceHighlight rounded-full transition-colors">
                <IconComponent name="X" size={18} />
              </button>

              <div className="text-center mb-6">
                <div className="w-16 h-16 bg-gradient-to-tr from-purple-100 to-pink-100 rounded-full flex items-center justify-center mx-auto mb-4">
                  <IconComponent name="Sparkles" size={32} className="text-purple-600" />
                </div>
                <h3 className="text-2xl font-bold text-primary mb-2">Starlight Academy</h3>
                <p className="text-secondary text-sm">请联系 卡卡（微信：XingYueAiArt）获取密钥</p>
              </div>

              <form onSubmit={handleSubmit} className="space-y-6">
                <div className="space-y-2">
                  <label className="text-xs font-bold text-secondary uppercase tracking-wider">Access Key</label>
                  <input
                    type="text"
                    value={code}
                    onChange={(e) => setCode(e.target.value.toUpperCase())}
                    className="w-full bg-surfaceHighlight border-2 border-transparent focus:bg-white focus:border-purple-500 rounded-xl px-4 py-3 text-center text-lg font-mono tracking-widest uppercase transition-all outline-none placeholder-gray-300"
                    placeholder="YOUR-ACCESS-KEY-HERE"
                    maxLength={32}
                    autoFocus
                  />
                </div>

                {error && (
                  <div className="p-3 bg-red-50 text-red-600 text-xs rounded-lg flex items-center justify-center gap-2">
                    <IconComponent name="AlertCircle" size={14} />
                    {error}
                  </div>
                )}

                <button
                  type="submit"
                  disabled={loading || code.length < 32}
                  className="w-full py-3.5 bg-primary hover:bg-primary/90 text-white rounded-xl font-medium shadow-lg hover:shadow-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                >
                  {loading ? 'Verifying...' : 'Unlock Access'}
                  {!loading && <IconComponent name="ArrowUpRight" size={16} />}
                </button>
              </form>

              <div className="mt-6 text-center text-[10px] text-gray-400">
                Contact your administrator to obtain an access key.
              </div>
            </div>
          </div>
        );
      };

      // Header Component
      const Header = ({
        activeCategory,
        setActiveCategory,
        currentPage,
        onChangePage,
        isAuthenticated,
        onTokenRequired,
        onLogout,
        headerConfig,
        cooperationImage,
        starlightAccess,
        starlightKeyInfo,
        onStarlightLogout,
        formatExpiryDate
      }) => {
        return (
          <header className="sticky top-0 z-50 w-full bg-white/80 backdrop-blur-xl border-b border-border">
            <div className="container mx-auto px-4 md:px-6 h-16 flex items-center justify-between">
              {/* Logo */}
              <div
                className="flex items-center gap-3 cursor-pointer"
                onClick={() => onChangePage('home')}
              >
                <div className="w-8 h-8 rounded-lg bg-primary flex items-center justify-center shadow-lg shadow-black/10 overflow-hidden">
                  {headerConfig?.avatarImage ? (
                    <img
                      src={headerConfig.avatarImage}
                      alt="头像"
                      className="w-full h-full object-cover"
                    />
                  ) : (
                    <span className="text-white font-bold text-lg leading-none">
                      {headerConfig?.avatar || 'K'}
                    </span>
                  )}
                </div>
                <div className="hidden md:block">
                  <h1 className="text-sm font-semibold text-primary tracking-tight">
                    {headerConfig?.title || 'Al Creative Commons'}
                  </h1>
                </div>
              </div>

              {/* Toggle (Only show on home) */}
              {currentPage === 'home' && (
                <div className="absolute left-1/2 transform -translate-x-1/2">
                  <div className="flex p-1 bg-surfaceHighlight rounded-full border border-border/50">
                    <button
                      onClick={() => setActiveCategory('AiCC')}
                      className={`px-6 py-1.5 rounded-full text-xs font-semibold transition-all duration-300 ${activeCategory === 'AiCC'
                        ? 'bg-white text-primary shadow-sm ring-1 ring-black/5'
                        : 'text-secondary hover:text-primary'
                        }`}
                    >
                      AiCC
                    </button>
                    <button
                      onClick={() => setActiveCategory('UXLib')}
                      className={`px-6 py-1.5 rounded-full text-xs font-semibold transition-all duration-300 ${activeCategory === 'UXLib'
                        ? 'bg-white text-primary shadow-sm ring-1 ring-black/5'
                        : 'text-secondary hover:text-primary'
                        }`}
                    >
                      UXLib
                    </button>
                    {isAuthenticated && (
                      <button
                        onClick={() => setActiveCategory('Learning')}
                        className={`px-6 py-1.5 rounded-full text-xs font-semibold transition-all duration-300 ${activeCategory === 'Learning'
                          ? 'bg-white text-primary shadow-sm ring-1 ring-black/5'
                          : 'text-secondary hover:text-primary'
                        }`}
                      >
                        Learning
                      </button>
                    )}
                    <button
                      onClick={() => setActiveCategory('Starlight Academy')}
                      className={`px-6 py-1.5 rounded-full text-xs font-semibold transition-all duration-300 ${activeCategory === 'Starlight Academy'
                        ? 'bg-purple-600 text-white shadow-md shadow-purple-200'
                        : 'text-secondary hover:text-primary'
                        }`}
                    >
                      <span className="flex items-center gap-1.5">
                        <IconComponent name="Sparkles" size={12} />
                        Starlight
                      </span>
                    </button>
                  </div>
                </div>
              )}

              {/* Right Actions */}
              <div className="flex items-center gap-4">
                {/* Starlight Access Status & Logout */}
                {starlightAccess && starlightKeyInfo && (
                  <div className="relative group">
                    <button className="flex items-center gap-2 px-3 py-1.5 rounded-full bg-purple-50 border border-purple-200 text-purple-700 text-xs font-medium hover:bg-purple-100 transition-colors">
                      <IconComponent name="Sparkles" size={12} />
                      <span>Starlight访问</span>
                    </button>
                    {/* Tooltip showing key expiry */}
                    <div className="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-2 opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none z-50">
                      <div className="bg-gray-900 text-white text-xs rounded-lg px-3 py-2 whitespace-nowrap">
                        <div className="text-center">
                          <div className="font-medium">访问密钥信息</div>
                          <div className="text-gray-300 mt-1">
                            到期时间: {formatExpiryDate(starlightKeyInfo.expiresAt)}
                          </div>
                          <div className="text-gray-400 text-[10px] mt-1">
                            密钥: {starlightKeyInfo.code.slice(0, 8)}...
                          </div>
                        </div>
                        <div className="w-2 h-2 bg-gray-900 transform rotate-45 absolute left-1/2 -translate-x-1/2 -bottom-1"></div>
                      </div>
                    </div>
                  </div>
                )}

                {/* Cooperation Button (Desktop Only) */}
                <div className="hidden md:block relative group">
                  <span className="text-xs font-semibold text-secondary hover:text-primary transition-colors cursor-pointer flex items-center gap-1">
                    合作交流
                  </span>

          const handleSave = async () => {
            const token = localStorage.getItem('authToken');
            try {
              // Note: Using the existing rename endpoint, but purely for visual name updates if supported
              // Since we added 'username' to the key object in backend, strictly speaking we might want to update THAT.
              // For now, we'll assume the 'rename' endpoint updates a display name which we can interpret as username or alias.
              // However, since we store 'username' in backend, let's just stick to the display for now or use the rename endpoint if it supports it.

              // For this task, "allowing configuration" at creation is the main requirement.
              const res = await fetch(`https://k.uxlib.cn/api/keys/${keyData.code}`, {
                method: 'PUT',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${token}`

      function App() {
        // API 配置 - 后端服务器地址
        const API_BASE_URL = 'https://k.uxlib.cn';

        // Authentication states
        const [isAuthenticated, setIsAuthenticated] = useState(false);
        const [showTokenModal, setShowTokenModal] = useState(false);

        // App states
        const [resources, setResources] = useState([]);
        const [filters, setFilters] = useState({});
        const [isDataLoading, setIsDataLoading] = useState(true);
        const [dataError, setDataError] = useState('');
        const [activeCategory, setActiveCategory] = useState('AiCC');
        const [activeFilter, setActiveFilter] = useState('All');
        const [searchQuery, setSearchQuery] = useState('');
        const [selectedTagFilter, setSelectedTagFilter] = useState('');
        const [view, setView] = useState('home');
        const [editingCard, setEditingCard] = useState(null);

        // Header config states
        const [headerConfig, setHeaderConfig] = useState({
          avatar: localStorage.getItem('header_avatar') || 'K',
          avatarImage: localStorage.getItem('header_avatar_image') || null,
          title: localStorage.getItem('header_title') || 'Al Creative Commons'
        });

        // Contact image config state
        const [contactImage, setContactImage] = useState(
          localStorage.getItem('contact_image') || null
        );
        const [cooperationImage, setCooperationImage] = useState(
          localStorage.getItem('cooperation_image') || null
        );

        // Starlight Access
        const [starlightAccess, setStarlightAccess] = useState(localStorage.getItem('starlight_token') ? true : false);
        const [starlightKeyInfo, setStarlightKeyInfo] = useState(() => {
          try {
            const stored = localStorage.getItem('starlight_key_info');
            return stored ? JSON.parse(stored) : null;
          } catch (error) {
            console.warn('Invalid starlight key info in localStorage:', error);
            localStorage.removeItem('starlight_key_info');
            return null;
          }
        });
        const [showAccessModal, setShowAccessModal] = useState(false);

        const handleCategoryChange = (category) => {
          if (category === 'Starlight Academy' && !starlightAccess) {
            setShowAccessModal(true);
            return;
          }
          setActiveCategory(category);
        };

        const handleTabVerify = (token, keyInfo) => {
          setStarlightAccess(true);
          setStarlightKeyInfo(keyInfo);
          localStorage.setItem('starlight_token', token); // Persist simplistic token
          localStorage.setItem('starlight_key_info', JSON.stringify(keyInfo)); // Persist key info
          setShowAccessModal(false);
          setActiveCategory('Starlight Academy');
        };

        // Starlight logout function
        const handleStarlightLogout = () => {
          const token = localStorage.getItem('starlight_token');
          if (token) {
            // Call logout API to remove token from server
            fetch('https://k.uxlib.cn/api/auth/logout', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
              }
            }).catch(error => console.error('Starlight logout error:', error));
          }
          // Clear local storage
          localStorage.removeItem('starlight_token');
          localStorage.removeItem('starlight_key_info');
          // Reset state
          setStarlightAccess(false);
          setStarlightKeyInfo(null);
          // Redirect to home or show message
          setActiveCategory('AiCC');
        };

        // Format expiry date for display
        const formatExpiryDate = (expiresAt) => {
          if (!expiresAt) return '';
          const date = new Date(expiresAt);
          return date.toLocaleDateString('zh-CN', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
          });
        };

        // Load resources & filters from JSON
        useEffect(() => {
          const loadData = async () => {
            try {
              const currentDataSources = getDataSources(isAuthenticated);
              const entries = await Promise.all(Object.entries(currentDataSources).map(async ([category, url]) => {
                const res = await fetch(url);
                if (!res.ok) throw new Error('加载 ' + category + ' 数据失败');
                const data = await res.json();
                return { category, data };
              }));
              const mergedResources = [];
              const mergedFilters = {};
              entries.forEach(({ category, data }) => {
                if (Array.isArray(data.resources)) {
                  mergedResources.push(...data.resources.map(item => ({ category, ...item })));
                }
                if (Array.isArray(data.filters)) {
                  mergedFilters[category] = data.filters;
                }
              });
              setResources(mergedResources.length ? mergedResources : DEFAULT_RESOURCES);
              setFilters(Object.keys(mergedFilters).length ? mergedFilters : DEFAULT_FILTERS);
              setDataError('');
            } catch (err) {
              console.error('加载分类数据失败:', err);
              setResources(DEFAULT_RESOURCES);
              setFilters(Object.keys(mergedFilters).length ? mergedFilters : DEFAULT_FILTERS);
              setDataError('资源数据加载失败，已使用内置默认数据');
            } finally {
              setIsDataLoading(false);
            }
          };
          loadData();
        }, [isAuthenticated]);

        // 获取存储的 token
        const getStoredToken = () => {
          return localStorage.getItem('authToken');
        };

        // 存储 token
        const setStoredToken = (token) => {
          if (token) {
            localStorage.setItem('authToken', token);
          } else {
            localStorage.removeItem('authToken');
          }
        };

        // 验证 token 是否有效
        const verifyToken = async (token) => {
          try {
            const response = await fetch(`${API_BASE_URL}/api/auth/verify`, {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
              }
            });

            const data = await response.json();

          setResources(prev => prev.filter(r => r.id !== id));
        };

        const handleSortResources = (sortBy, order) => {
          setResources(prev => {
            const sorted = [...prev].sort((a, b) => {
              let aValue = a[sortBy];
              let bValue = b[sortBy];

              if (sortBy === 'title') {
                aValue = aValue.toLowerCase();
                bValue = bValue.toLowerCase();
              }

              if (order === 'asc') {
                return aValue < bValue ? -1 : aValue > bValue ? 1 : 0;
              } else {
                return aValue > bValue ? -1 : aValue < bValue ? 1 : 0;
              }
            });
            return sorted;

          setFilters(prev => ({

            [activeCategory]: prev[activeCategory].filter(f => f.tag !== tagToDelete)
          }));
        };

        const filteredResources = useMemo(() => {
          // Learning分类权限检查：未认证用户访问Learning时返回空数组
          if (activeCategory === 'Learning' && !isAuthenticated) {
            return [];
          }

          let items = resources.filter(item => item.category === activeCategory);

          // 先应用标签筛选（如果选择了标签筛选）
          if (selectedTagFilter) {
            items = items.filter(item => item.tags.some(t => t === selectedTagFilter));
          } else if (activeFilter !== 'All' && !searchQuery) {
            // 如果没有搜索查询，使用标签按钮筛选
            // 筛选逻辑：卡卡推荐显示精选资源，其他标签正常筛选
            if (activeFilter === '卡卡推荐') {
              items = items.filter(item =>
                item.featured === true &&
                item.category === activeCategory
              );
            } else {
              // 其他标签按正常逻辑筛选
              items = items.filter(item => item.tags.some(t => t === activeFilter || t.includes(activeFilter)));
            }
          }

          // 再应用搜索查询筛选
          if (searchQuery) {
            const lowerQ = searchQuery.toLowerCase();
            items = items.filter(item =>
              item.title.toLowerCase().includes(lowerQ) ||
              item.description.toLowerCase().includes(lowerQ) ||
              item.tags.some(t => t.toLowerCase().includes(lowerQ))
            );
          }

          // 排序：卡卡推荐置顶，其他按标题字母顺序
          items = items.sort((a, b) => {
            // 首先按featured状态排序
            if (a.featured && !b.featured) return -1;
            if (!a.featured && b.featured) return 1;

            // 然后按标题字母顺序排序
            return a.title.localeCompare(b.title, 'zh-CN');
          });

          return items;

            categoryResources = categoryResources.filter(item => item.featured === true);
          }

          const tagSet = new Set();
          categoryResources.forEach(item => {
            item.tags.forEach(tag => tagSet.add(tag));
          });
          return Array.from(tagSet).sort();
        }, [resources, activeCategory, activeFilter]);

                          : activeCategory === 'UXLib'
                            ? 'UXLib'
                            : activeCategory === 'Learning'
                              ? '内部学习资源'
                              : 'Starlight Academy'}
                      </h2>
                      <p className={`text-sm md:text-base text-secondary max-w-2xl mx-auto leading-relaxed animate-slide-up-delay`}>
                        {activeCategory === 'AiCC'
                          ? '探索AI绘画模型和ComfyUI资料集合丨欢迎合作交流微信🛰️XingYueAIArt'
                          : activeCategory === 'UXLib'
                            ? '跟我学习更多UI/UX知识丨欢迎合作交流微信🛰️XingYueAIArt'
                            : activeCategory === 'Learning'
                              ? '学习资源与教程集合丨欢迎合作交流微信🛰️XingYueAIArt'
                              : 'Starlight探索与内部学习资源丨欢迎合作交流微信🛰️XingYueAIArt'}
                      </p>
                    </div>
                  </div>

                  {/* Filters & Search Toolbar */}
                  <div className="flex flex-col md:flex-row items-start md:items-center justify-between gap-4 w-full">
                    {/* Tabs (Scrollable on Mobile) */}
                    <div className="w-full md:w-auto overflow-x-auto no-scrollbar pb-1 -mx-4 px-4 md:mx-0 md:px-0">
                      <div className="flex gap-2 min-w-max">
                        {(filters[activeCategory] || DEFAULT_FILTERS[activeCategory] || [])
                          .map((filter) => (
                            <button
                              key={filter.label}
                              onClick={() => {
                                setActiveFilter(filter.tag);
                                setSearchQuery('');
                                setSelectedTagFilter('');
                              }}
                              className={`px-4 py-2 rounded-full text-xs font-medium transition-all duration-300 border ${activeFilter === filter.tag && !searchQuery && !selectedTagFilter
                                ? 'bg-primary text-white border-primary shadow-md'
                                : 'bg-white text-secondary border-border hover:border-accent hover:text-primary'
                                }`}
                            >
                              {filter.label}
                            </button>
                          ))}
                      </div>
                    </div>

                    {/* Search Box & Tag Filter */}
                    <div className="flex gap-2 w-full md:w-auto">
                      {/* Tag Filter */}
                      <div className="relative">
                        <select
                          value={selectedTagFilter}
                          onChange={(e) => {
                            setSelectedTagFilter(e.target.value);
                            setActiveFilter('All');
                          }}
                          className="bg-surfaceHighlight border border-transparent focus:bg-white focus:border-border rounded-full pl-4 pr-8 py-2 text-xs focus:outline-none transition-all appearance-none cursor-pointer text-secondary hover:text-primary min-w-[120px]"
                        >
                          <option value="">全部标签</option>
                          {availableTags.map(tag => (
                            <option key={tag} value={tag}>{tag}</option>
                          ))}
                        </select>
                        <div className="absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none">
                          <svg className="w-3 h-3 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                          </svg>
                        </div>
                      </div>

                      {/* Search Box */}
                      <div className="relative flex-1 md:w-64 group">
                        <IconComponent name="Search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-secondary group-focus-within:text-primary transition-colors" />
                        <input
                          type="text"
                          placeholder="搜索工具..."
                          value={searchQuery}
                          onChange={(e) => {
                            setSearchQuery(e.target.value);
                            if (e.target.value) {
                              setActiveFilter('All');
                            }
                          }}
                          className="w-full bg-surfaceHighlight border border-transparent focus:bg-white focus:border-border rounded-full pl-9 pr-4 py-2 text-xs focus:outline-none transition-all placeholder:text-secondary/70"
                        />
                        {searchQuery && (
                          <button
                            onClick={() => setSearchQuery('')}
                            className="absolute inset-y-0 right-0 pr-3 flex items-center text-secondary hover:text-primary transition-colors"
                          >
                            <IconComponent name="X" size={14} />
                          </button>
                        )}
                      </div>
                    </div>
                  </div>
                </div>

                {/* Learning分类访问控制：未认证用户显示提示，已认证用户正常显示 */}
                {activeCategory === 'Learning' && !isAuthenticated ? (
                  <div className="access-denied-container" style={{
                    display: 'flex',
                    flexDirection: 'column',
                    alignItems: 'center',
                    justifyContent: 'center',
                    height: '400px',
                    textAlign: 'center',
                    padding: '40px',
                    background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                    borderRadius: '16px',
                    color: 'white'
                  }}>
                    <div style={{
                      fontSize: '4rem',
                      marginBottom: '20px'
                    }}>🔒</div>
                    <h2 style={{ marginBottom: '16px', fontSize: '1.5rem' }}>
                      Learning分类需要登录访问
                    </h2>
                    <p style={{ marginBottom: '24px', opacity: 0.9, lineHeight: '1.6' }}>
                      Learning分类包含专业的学习资源和内容，<br/>
                      请先登录后再访问此分类。
                    </p>
                    <button
                      onClick={onTokenRequired}
                      style={{
                        backgroundColor: 'rgba(255, 255, 255, 0.2)',
                        border: '2px solid white',
                        color: 'white',
                        padding: '12px 24px',
                        borderRadius: '8px',
                        cursor: 'pointer',
                        fontSize: '16px',
                        transition: 'all 0.3s ease'
                      }}
                      onMouseOver={(e) => {
                        e.target.style.backgroundColor = 'white';
                        e.target.style.color = '#667eea';
                      }}
                      onMouseOut={(e) => {
                        e.target.style.backgroundColor = 'rgba(255, 255, 255, 0.2)';
                        e.target.style.color = 'white';
                      }}
                    >
                      立即登录访问
                    </button>
                  </div>
                ) : (
                  <>
                    {/* Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-6 gap-y-10">
                      {filteredResources.map((item) => (
                        <ResourceCard key={item.id} item={item} onEdit={handleEditCard} />
                      ))}
                    </div>

                    {/* Empty State */}
                    {filteredResources.length === 0 && (
                      isDataLoading ? (
                        <div className="flex items-center justify-center py-20 text-secondary text-sm">
                          数据加载中...
                        </div>
                      ) : (
                        <div className="flex flex-col items-center justify-center py-32 border border-dashed border-border rounded-2xl bg-surfaceHighlight/30">
                          <div className="p-4 bg-surface rounded-full mb-4 shadow-sm">
                            {activeFilter === '卡卡推荐' ? (
                              <IconComponent name="Star" size={24} className="text-amber-500/50" />
                            ) : (
                              <IconComponent name="Search" size={24} className="text-secondary/50" />
                            )}
                          </div>
                          <p className="text-secondary text-sm font-medium text-center">
                            {activeFilter === '卡卡推荐'
                              ? '当前分类暂无卡卡推荐资源'
                              : (dataError || '没有找到匹配的资源。')
                            }
                          </p>
                          <button
                            onClick={() => { setActiveFilter('All'); setSearchQuery(''); }}
                            className="mt-2 text-xs text-primary underline underline-offset-4 hover:text-accent"
                          >
                            清除所有过滤器
                          </button>
                        </div>
                      )
                    )}
                  </>
                )}
              </main>
            )}

            {/* Footer */}
            <footer className="py-12 border-t border-border/50">
              <div className="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center text-secondary text-[11px] uppercase tracking-wider font-medium">
                <p>&copy; {new Date().getFullYear()} Al Creative Commons.</p>
                <div className="flex gap-6 mt-4 md:mt-0 items-center">
                  <div className="relative group">
                    <span className="hover:text-primary transition-colors cursor-pointer">联系我</span>
                    {contactImage && (
                      <div className="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-2 opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none z-50 hidden md:block">
                        <div className="w-48 h-48 bg-white rounded-lg shadow-xl border border-border p-2">
                          <img
                            src={contactImage}
                            alt="联系我"
                            className="w-full h-full object-cover rounded"
                          />
                        </div>
                        <div className="w-3 h-3 bg-white border-r border-b border-border transform rotate-45 absolute left-1/2 -translate-x-1/2 -bottom-1.5"></div>
                      </div>
                    )}
                  </div>
                  <a href="https://space.bilibili.com/368719574?spm_id_from=333.1007.0.0" target="_blank" rel="noopener noreferrer" className="hover:text-primary transition-colors">Bilibili</a>
                  <a href="https://www.xiaohongshu.com/user/profile/5c57870b0000000011020e5a" target="_blank" rel="noopener noreferrer" className="hover:text-primary transition-colors">小红书</a>
                </div>
              </div>
            </footer>



            {/* Card Edit Modal */}
            {editingCard && (
              <CardEditModal
                card={editingCard}
                onSave={handleSaveCard}
                onClose={handleCloseModal}
              />
            )}



            {/* Token Modal */}
            {showTokenModal && (
              <TokenModal
                onSuccess={handleTokenSuccess}
                onClose={() => setShowTokenModal(false)}
              />
            )}
          </div>
        );
      }

      // Render app
      const rootElement = document.getElementById('root');
      if (rootElement) {
        const root = createRoot(rootElement);
        root.render(<App />);



      } else {
        document.getElementById('errors').innerHTML =
          '<div class="error-box">❌ 根元素未找到</div>';
      }

    } catch (error) {
      console.error('❌ 应用错误:', error);
      document.getElementById('errors').innerHTML =
        `<div class="error-box">❌ JavaScript错误: ${error.message}<br><pre>${error.stack}</pre></div>`;
    }
  </script>
</body>

</html>
